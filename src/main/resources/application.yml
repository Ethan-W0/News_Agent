spring:
  application:
    name: ai-Agent
  main:
    allow-bean-definition-overriding: true   # 解决 dashscope 多依赖 Bean 同名冲突
  ai:
    dashscope:
        api-key: sk-
        chat:
          options:
            model: qwen-max
search-api:
  api-key: tvly-
server:
  port: 8123
  servlet:
    context-path: /api        # 路径前缀，只有访问/api才能访问到后端接口
# springdoc-openapi 接口文档
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.ran.aiagent.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

